version: "3"

vars:
  PROJECT_NAME: equitherm-core

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  dev:
    desc: Start TypeScript compiler in watch mode
    cmds:
      - pnpm dev

  build:
    desc: Build the package
    cmds:
      - pnpm build

  test:
    desc: Run tests
    cmds:
      - pnpm test

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - pnpm test:watch

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - pnpm typecheck

  clean:
    desc: Remove build artifacts and node_modules
    cmds:
      - rm -rf node_modules dist

  clean:dist:
    desc: Remove build artifacts only
    cmds:
      - rm -rf dist

  reinstall:
    desc: Clean and reinstall dependencies
    cmds:
      - task: clean
      - task: install

  ci:
    desc: Run CI checks (install, build, typecheck, test)
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm build
      - pnpm typecheck
      - pnpm test
